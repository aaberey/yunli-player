<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yun Li Player</title>
  <link rel="stylesheet" href="style.css">
  <script> 
    let albb = "Bonda4.json";
    let originalGradient = ""; // Variável para armazenar o gradiente original

    function changeBackground() {
      // Muda a cor de fundo para preto
      document.body.style.backgroundColor = "#000000";

      // Piscar de fundo por 5 segundos
      let startTime = Date.now();

      const interval = setInterval(() => {
        // Alterna entre preto e o gradiente original
        if (document.body.style.backgroundColor === "rgb(0, 0, 0)") {
          document.body.style.backgroundColor = originalGradient ? "" : "#000000"; // Se a cor for preto, volta ao original
        } else {
          document.body.style.backgroundColor = "#000000"; // Se não, muda para preto
        }

        // Verifica se já passaram 5 segundos
        if (Date.now() - startTime > 5000) {
          clearInterval(interval); // Para o intervalo após 5 segundos
          document.body.style.backgroundColor = originalGradient || ""; // Remove a cor de fundo, voltando para o original
        }
      }, 500); // Altera a cada 500 milissegundos
    }

    function changeAlbum(albumName, imagePath, gradient, progressColor, playlistColor) {
      // Armazena o gradiente original antes de mudar
      originalGradient = gradient;
      changeBackground(); // Chama a função para mudar o fundo
      
      var img = document.getElementById("cover-image");
      img.src = imagePath;
      albb = albumName;
      document.body.style.backgroundImage = originalGradient;
      document.querySelector('.progress-bar').style.backgroundColor = progressColor;
      document.querySelector('.playlist').style.backgroundColor = playlistColor;
      currentTrackIndex = 0; // Reseta o índice para a primeira faixa
      loadTracks(albb); // Carrega as músicas do novo álbum
    }

    function BonsTempos() {
      changeAlbum("BonsTempos.json", "./images/BonsTempos.png", "linear-gradient(270deg, #000000, #151322)", "#312159", "#312159");
    }

    function Bonda1() {
      changeAlbum("Bonda1.json", "./images/Bonda1.png", "linear-gradient(270deg, #25B434, #E0355D)", "#25B434", "#25B434");
    }

    function Bonda2() {
      changeAlbum("Bonda2.json", "./images/Bonda2.png", "linear-gradient(270deg, #000000, #B3643E)", "#C87245", "#C87245");
    }

    function Bonda3() {
      changeAlbum("Bonda3.json", "./images/Bonda3.png", "linear-gradient(270deg, #000000, #611111)", "#E8223B", "#820F29");
    }

    function Bonda4() {
      changeAlbum("Bonda4.json", "./images/Bonda4.png", "linear-gradient(270deg, #000000, #611111)", "#E8223B", "#820F29");
    }

    function Validation() {
      changeAlbum("Validation.json", "./images/Validation.png", "linear-gradient(270deg, #000000, #00799A)", "#0182A2", "#002D3E");
    }

    function Bittersweet() {
      changeAlbum("Bittersweet.json", "./images/Bittersweet.png", "linear-gradient(270deg, #000000, #4D130B)", "#FFE849", "#480800");
    }

    function Quarentapes() {
      changeAlbum("Quarentapes.json", "./images/Quarentapes.png", "linear-gradient(270deg, #000000, #FFDB00)", "#FFDD00", "#95751C");
    }

    function Cybertapes() {
      changeAlbum("Cybertapes.json", "./images/Cybertapes.png", "linear-gradient(270deg, #000000, #30043B)", "#7B4EB7", "#30043B");
    }

    function Hyperpoop() {
      changeAlbum("Hyperpoop.json", "./images/Hyperpoop.png", "linear-gradient(270deg, #000000, #390907)", "#BC0B0A", "#860B0A");
    }
  </script>
</head>

<body>
  <div class="butaos">
    <div class="button-container">
      <button class="styled-button" onclick="Quarentapes();">Quarentapes</button>
      <button class="styled-button" onclick="Cybertapes();">Cybertapes</button>
      <button class="styled-button" onclick="Bonda1();">Bonda 1</button>
      <button class="styled-button" onclick="Bonda2();">Bonda 2</button>
      <button class="styled-button" onclick="Bonda3();">Bonda 3</button>
      <button class="styled-button" onclick="Bonda4();">Bonda 4</button>
    </div>
    <div class="button-container">
      <button class="styled-button" onclick="Hyperpoop();">SPG Hyperpoop</button>
      <button class="styled-button" onclick="Validation();">Validation</button>
      <button class="styled-button" onclick="Bittersweet();">Bittersweet Memories</button>
      <button class="styled-button" onclick="BonsTempos();">Bons Tempos</button>
    </div>
  </div>

  <div class="player-container">
    <div class="player">
      <img id="cover-image" src="images/Gema.png" alt="Capa da Música" class="cover-image">
      
      <!-- Barra de Progresso -->
      <div class="progress-bar-container" id="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      
      <!-- Barra de Volume -->
      <div class="volume-bar-container" id="volume-bar-container">
        <div id="volume-bar" class="volume-bar"></div>
      </div>

      <div class="controls">
        <button id="prev-btn" class="control-btn">⏮️</button>
        <button id="play-btn" class="control-btn">▶️</button>
        <button id="next-btn" class="control-btn">⏭️</button>
        <button id="shuffle-btn" class="control-btn">➡️</button>
      </div>
    </div>

    <div class="playlist">
      <ul id="playlist"></ul>
      <div class="pagination">
        <button id="prev-page" class="pagination-btn">⬅️</button>
        <span id="page-info"></span>
        <button id="next-page" class="pagination-btn">➡️</button>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>
  <script src="script.js"></script>
</body>
</html>
